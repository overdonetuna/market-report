<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير السوق اليومي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0e14;
    --panel: #11151d;
    --panel-2: #161b25;
    --line: #232938;
    --text: #e8eaf0;
    --text-dim: #8b93a7;
    --accent: #c9a35e; /* ذهبي خافت - لمسة مالية */
    --up: #3ddc84;
    --down: #ef5b5b;
    --radius: 14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    direction: rtl;
    min-height:100vh;
  }
  body{
    background-image:
      radial-gradient(circle at 15% 0%, rgba(201,163,94,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(61,220,132,0.04), transparent 40%);
  }
  .wrap{max-width: 920px; margin:0 auto; padding: 28px 20px 60px;}

  header{
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--line);
  }
  .brand{display:flex; flex-direction:column; gap:4px;}
  .brand .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.12em;
    color: var(--accent); text-transform:uppercase;
  }
  .brand h1{font-size: 22px; font-weight:700;}
  .meta{text-align:left; font-family:'IBM Plex Mono', monospace; font-size:12px; color: var(--text-dim); direction:ltr;}
  .meta .dot{display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--up); margin-left:6px;}

  /* Hero: قيمة المحفظة */
  .hero{
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border:1px solid var(--line); border-radius: var(--radius);
    padding: 28px 26px; margin-bottom: 22px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:18px;
  }
  .hero .label{font-size:13px; color:var(--text-dim); margin-bottom:8px;}
  .hero .value{font-family:'IBM Plex Mono', monospace; font-size:40px; font-weight:600; letter-spacing:-0.01em;}
  .hero .sub{font-size:13px; color:var(--text-dim); margin-top:6px;}
  .pill{
    font-family:'IBM Plex Mono', monospace; font-size:15px; font-weight:600;
    padding:8px 16px; border-radius: 999px; white-space:nowrap;
  }
  .pill.up{ background: rgba(61,220,132,0.12); color: var(--up); }
  .pill.down{ background: rgba(239,91,91,0.12); color: var(--down); }

  /* بطاقات الأسهم */
  .section-title{
    font-size:13px; color:var(--text-dim); letter-spacing:.06em; text-transform:uppercase;
    margin: 26px 0 12px; font-family:'IBM Plex Mono', monospace;
  }
  .holdings{
    border:1px solid var(--line); border-radius: var(--radius); overflow:hidden;
  }
  .holding{
    display:flex; justify-content:space-between; align-items:center;
    padding: 16px 18px; background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .holding:last-child{border-bottom:none;}
  .holding .left{display:flex; align-items:center; gap:12px;}
  .ticker{
    font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:14px;
    color: var(--text); background: var(--panel-2); padding:4px 10px; border-radius:6px;
    direction:ltr;
  }
  .holding .price-info{font-size:13px; color:var(--text-dim); direction:ltr; text-align:left;}
  .holding .change{font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:14px; direction:ltr;}
  .change.up{color:var(--up);} .change.down{color:var(--down);}

  /* الأخبار */
  .news{display:flex; flex-direction:column; gap:10px;}
  .news-item{
    background: var(--panel); border:1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; font-size: 14px; line-height:1.7;
  }
  .news-item .tag{
    font-family:'IBM Plex Mono', monospace; font-size:10px; color: var(--accent);
    text-transform:uppercase; letter-spacing:.08em; display:block; margin-bottom:6px;
  }

  footer{
    margin-top: 36px; padding-top:18px; border-top:1px solid var(--line);
    font-size:12px; color: var(--text-dim); text-align:center;
  }

  @media (max-width:560px){
    .hero{flex-direction:column; align-items:flex-start;}
    .hero .value{font-size:32px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="eyebrow">Daily Market Brief</span>
      <h1>تقرير السوق اليومي</h1>
    </div>
    <div class="meta" id="last-updated">
      <span class="dot"></span>آخر تحديث: —
    </div>
  </header>

  <div class="hero">
    <div>
      <div class="label">القيمة الإجمالية للمحفظة</div>
      <div class="value" id="portfolio-value">$0.00</div>
      <div class="sub" id="portfolio-cost">التكلفة: $0.00</div>
    </div>
    <div class="pill" id="portfolio-change">0.00%</div>
  </div>

  <div class="section-title">المحفظة</div>
  <div class="holdings" id="holdings-list">
    <!-- تُملأ تلقائيًا من data.json -->
  </div>

  <div class="section-title">أخبار وتحليل</div>
  <div class="news" id="news-list">
    <!-- تُملأ تلقائيًا من data.json -->
  </div>

  <footer>
    يُحدَّث تلقائيًا يوميًا الساعة 10:00 صباحًا بتوقيت الرياض · مولّد عبر Claude
  </footer>

</div>

<script>
async function loadReport(){
  try{
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();

    document.getElementById('last-updated').innerHTML =
      '<span class="dot"></span>آخر تحديث: ' + (data.updated_at || '—');

    document.getElementById('portfolio-value').textContent =
      '$' + Number(data.portfolio_value || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

    document.getElementById('portfolio-cost').textContent =
      'التكلفة: $' + Number(data.portfolio_cost || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

    const changeEl = document.getElementById('portfolio-change');
    const change = Number(data.portfolio_change_pct || 0);
    changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
    changeEl.className = 'pill ' + (change >= 0 ? 'up' : 'down');

    const holdingsList = document.getElementById('holdings-list');
    holdingsList.innerHTML = '';
    (data.holdings || []).forEach(h => {
      const chg = Number(h.change_pct || 0);
      holdingsList.innerHTML += `
        <div class="holding">
          <div class="left">
            <span class="ticker">${h.ticker}</span>
            <span class="price-info">${h.shares} سهم @ $${Number(h.price).toFixed(2)}</span>
          </div>
          <span class="change ${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(2)}%</span>
        </div>`;
    });

    const newsList = document.getElementById('news-list');
    newsList.innerHTML = '';
    (data.news || []).forEach(n => {
      newsList.innerHTML += `
        <div class="news-item">
          <span class="tag">${n.tag || 'سوق'}</span>
          ${n.text}
        </div>`;
    });

  }catch(e){
    document.getElementById('holdings-list').innerHTML =
      '<div class="holding">تعذّر تحميل البيانات — تحقق من ملف data.json</div>';
    console.error(e);
  }
}
loadReport();
</script>
</body>
</html>
